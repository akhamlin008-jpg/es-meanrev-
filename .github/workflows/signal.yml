name: nightly-signal

on:
  schedule:
    # 23:00 UTC Mon–Fri = 7:00 pm ET during EDT, 6:00 pm ET during EST.
    # GitHub cron is UTC and best-effort: runs can start minutes-to-an-hour
    # late. The dashboard shows generated_utc so lateness is visible.
    - cron: "0 23 * * 1-5"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

permissions:
  contents: write

concurrency:
  group: nightly-signal
  cancel-in-progress: false

jobs:
  signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Research data for the quantlab backtests. signal_check.py does NOT
      # read this -- it fetches its own daily bars. So a Yahoo 1-min failure
      # must never block the signal below.
      - name: Update 1-min research cache (non-blocking)
        continue-on-error: true
        run: python scripts/update_cache.py

      - name: Compute signal (single source of truth)
        run: python scripts/signal_check.py

      - name: Export signal.json (read-only serialization)
        run: python scripts/export_signal.py

      - name: Commit log + json back to this repo
        run: |
          git config user.name  "signal-bot"
          git config user.email "actions@github.com"
          git add -A signals_log.csv signal.json data 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "nothing changed"
            exit 0
          fi
          git commit -m "signal: $(date -u +%F) run"
          # If anything else landed on main while this job was running (an edit
          # in the web UI, an overlapping run), a plain push is rejected.
          # Replay our commit on top of theirs and retry instead of failing.
          for i in 1 2 3; do
            if git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push rejected -- rebasing onto latest main (attempt $i)"
            git pull --rebase --autostash origin main || exit 1
          done
          echo "::error::could not push after 3 attempts"
          exit 1
